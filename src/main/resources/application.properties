# ===============================
# H2 DATABASE (File Mode)
# ===============================
spring.datasource.url=jdbc:h2:file:${user.home}/nnss-db/nnss
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# H2 Console (Optional - Recommended)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


# JWT
jwt.secret=ReplaceThisWithAStrongSecretKeyOfAtLeast32Chars!
jwt.expiration-ms=86400000   # 1 day

# Folder where images will be stored
file.upload-dir=src/main/resources/static/uploads/employees


# ? Enable multipart uploads
spring.servlet.multipart.enabled=true

# ? File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# (optional) Temp location for uploads
spring.servlet.multipart.location=./uploads/tmp

logging.file.name=logs/app.log
logging.level.root=INFO

server.port=8888
